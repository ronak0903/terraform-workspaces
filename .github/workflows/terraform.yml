name: Terraform Cloud Pipeline

on:

  push:
    branches:
      - main
    paths:
      - '**.tf'
      - '.github/workflows/terraform.yml'

  pull_request:
    branches:
      - main
    paths:
      - '**.tf'
      - '.github/workflows/terraform.yml'

  workflow_dispatch:

    inputs:

      environment:
        description: "Select Environment"
        required: true
        type: choice
        options:
          - dev
          - stage

      action:
        description: "Terraform Action"
        required: true
        type: choice
        options:
          - validate
          - plan
          - destroy

jobs:

  terraform:

    name: "Terraform (${{ matrix.environment }} - ${{ github.event.inputs.action || (github.event_name == 'pull_request' && 'pr-plan' || 'plan') }})"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        environment: ${{ github.event.inputs.environment && fromJSON(format('["{0}"]', github.event.inputs.environment)) || fromJSON('["dev", "stage"]') }}

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: aws-${{ matrix.environment }}

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        if: github.event.inputs.action == 'validate' || github.event_name == 'push' || github.event_name == 'pull_request'
        id: validate
        run: terraform validate -no-color

      - name: Trigger HCP Terraform Run (Plan / Destroy)
        if: github.event.inputs.action == 'plan' || github.event.inputs.action == 'destroy' || github.event_name == 'push' || github.event_name == 'pull_request'
        id: tfe-run
        uses: kvrhdn/tfe-run@v1
        with:
          token: ${{ secrets.TF_API_TOKEN }}
          organization: ronakHCP
          workspace: ${{ env.TF_WORKSPACE }}
          message: "Triggered from GitHub Actions (Commit: ${{ github.sha }} | Event: ${{ github.event_name }})"
          type: ${{ github.event.inputs.action == 'destroy' && 'destroy' || 'apply' }}
          speculative: ${{ github.event_name == 'pull_request' }}
          wait-for-completion: ${{ github.event_name == 'pull_request' }}

      - name: Fetch Plan Details and Comment on PR
        if: github.event_name == 'pull_request' && always() && steps.tfe-run.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
          RUN_ID: ${{ steps.tfe-run.outputs.run-id }}
          RUN_URL: ${{ steps.tfe-run.outputs.run-url }}
          WORKSPACE: ${{ env.TF_WORKSPACE }}
        run: |
          # 1. Fetch Run Details
          RUN_RESPONSE=$(curl -s \
            --header "Authorization: Bearer $TF_API_TOKEN" \
            --header "Content-Type: application/vnd.api+json" \
            https://app.terraform.io/api/v2/runs/$RUN_ID)

          # Extract Plan ID
          PLAN_ID=$(echo "$RUN_RESPONSE" | jq -r '.data.relationships.plan.data.id')

          # 2. Fetch Plan Details
          PLAN_RESPONSE=$(curl -s \
            --header "Authorization: Bearer $TF_API_TOKEN" \
            --header "Content-Type: application/vnd.api+json" \
            https://app.terraform.io/api/v2/plans/$PLAN_ID)

          # Extract additions, changes, destructions
          ADDITIONS=$(echo "$PLAN_RESPONSE" | jq -r '.data.attributes."resource-additions"')
          CHANGES=$(echo "$PLAN_RESPONSE" | jq -r '.data.attributes."resource-changes"')
          DESTRUCTIONS=$(echo "$PLAN_RESPONSE" | jq -r '.data.attributes."resource-destructions"')

          # 3. Format Comment Body
          COMMENT_BODY="### 🤖 HCP Terraform Plan Results (\`${WORKSPACE}\`)

          A speculative plan has been successfully completed for workspace **${WORKSPACE}**:
          
          | Additions 🟢 | Changes 🟡 | Destructions 🔴 |
          |:---:|:---:|:---:|
          | **${ADDITIONS}** | **${CHANGES}** | **${DESTRUCTIONS}** |

          🔗 [View Detailed Plan Logs on HCP Terraform](${RUN_URL})

          *Note: This is a speculative plan. Apply must be triggered via the main pipeline after merge.*"

          # 4. Post comment to PR
          curl -s \
            -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg body "$COMMENT_BODY" '{body: $body}')" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.number }}/comments"

      - name: Send Slack Notification
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ steps.tfe-run.outputs.run-url }}
          RUN_STATUS: ${{ steps.tfe-run.outcome }}
          WORKSPACE: ${{ env.TF_WORKSPACE }}
        run: |
          # 0. Check if webhook is set
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "Slack Webhook URL is not configured. Skipping notification."
            exit 0
          fi

          # 1. Determine color and message based on status
          if [ "${{ job.status }}" = "success" ]; then
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              COLOR="#2eb886" # Green
              STATUS_TEXT="🟢 Speculative Plan Completed"
            else
              COLOR="#e0a111" # Yellow
              STATUS_TEXT="🟡 Run Queued (Pending Approval)"
            fi
          else
            COLOR="#a30200" # Red
            STATUS_TEXT="🔴 Pipeline Failed"
          fi

          # 2. Build standard fields
          COMMIT_LINK="<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
          MESSAGE="*Workspace:* \`${WORKSPACE}\`\n*Event:* \`${{ github.event_name }}\` (by ${{ github.actor }})\n*Commit:* ${COMMIT_LINK}"

          # 3. Add details if run URL is available
          if [ ! -z "$RUN_URL" ]; then
            ACTIONS_BLOCK=",
            {
              \"type\": \"actions\",
              \"elements\": [
                {
                  \"type\": \"button\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"View Run on HCP\",
                    \"emoji\": true
                  },
                  \"url\": \"${RUN_URL}\"
                }
              ]
            }"
          else
            ACTIONS_BLOCK=""
          fi

          # 4. Construct block payload
          PAYLOAD="{\"attachments\":[{
            \"color\": \"${COLOR}\",
            \"blocks\": [
              {
                \"type\": \"header\",
                \"text\": {
                  \"type\": \"plain_text\",
                  \"text\": \"HCP Terraform: ${STATUS_TEXT}\",
                  \"emoji\": true
                }
              },
              {
                \"type\": \"section\",
                \"text\": {
                  \"type\": \"mrkdwn\",
                  \"text\": \"${MESSAGE}\"
                }
              }${ACTIONS_BLOCK}
            ]
          }]}"

          # 5. Send to Slack
          curl -s -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK"