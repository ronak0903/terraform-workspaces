name: Terraform Cloud Pipeline

on:

  push:
    branches:
      - main
    paths:
      - '**.tf'
      - '.github/workflows/terraform.yml'

  workflow_dispatch:

    inputs:

      environment:
        description: "Select Environment"
        required: true
        type: choice
        options:
          - dev
          - stage

      action:
        description: "Terraform Action"
        required: true
        type: choice
        options:
          - validate
          - plan
          - destroy

jobs:

  terraform:

    name: "Terraform (${{ matrix.environment }} - ${{ github.event.inputs.action || 'plan' }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ github.event.inputs.environment && fromJSON(format('["{0}"]', github.event.inputs.environment)) || fromJSON('["dev", "stage"]') }}

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: aws-${{ matrix.environment }}

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        if: github.event.inputs.action == 'validate' || github.event_name == 'push'
        id: validate
        run: terraform validate -no-color

      - name: Trigger HCP Terraform Run (Plan / Destroy)
        if: github.event.inputs.action == 'plan' || github.event.inputs.action == 'destroy' || github.event_name == 'push'
        id: tfe-run
        uses: kvrhdn/tfe-run@v1
        with:
          token: ${{ secrets.TF_API_TOKEN }}
          organization: ronakHCP
          workspace: ${{ env.TF_WORKSPACE }}
          message: "Triggered from GitHub Actions (Commit: ${{ github.sha }} | Event: ${{ github.event_name }})"
          type: ${{ github.event.inputs.action == 'destroy' && 'destroy' || 'apply' }}

      - name: Pipeline Summary
        if: always()
        run: |
          echo "## Terraform Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Workspace | \`${{ env.TF_WORKSPACE }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔧 Init | \`${{ steps.init.outcome }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 📝 Format | \`${{ steps.fmt.outcome }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Validate | \`${{ steps.validate.outcome || 'skipped' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🚀 HCP Run Trigger | \`${{ steps.tfe-run.outcome || 'skipped' }}\` |" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.tfe-run.outcome }}" = "success" ]; then
            echo "| 🔗 Run Link | [View Run on HCP Terraform](${{ steps.tfe-run.outputs.run-url }}) |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Note:** Apply and Destroy are managed exclusively through [HCP Terraform Cloud](https://app.terraform.io)." >> $GITHUB_STEP_SUMMARY
          echo "> Click the **Run Link** above or go to your HCP portal to confirm and apply/destroy the planned changes." >> $GITHUB_STEP_SUMMARY