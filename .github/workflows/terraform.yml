name: Terraform Cloud Pipeline

on:
  push:
    branches: [main]
    paths:
      - '**.tf'
      - '.github/workflows/terraform.yml'

  pull_request:
    branches: [main]
    paths:
      - '**.tf'
      - '.github/workflows/terraform.yml'

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — CI  (validate + speculative plan on PR / validate on push)
# Runs automatically on every push and pull_request
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  ci:
    name: "CI — ${{ matrix.environment }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        environment: [dev, stage]

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: aws-${{ matrix.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Speculative Plan (PR only — shows diff, does NOT apply)
        if: github.event_name == 'pull_request'
        id: tfe-pr
        uses: kvrhdn/tfe-run@v1
        with:
          token: ${{ secrets.TF_API_TOKEN }}
          organization: ronakHCP
          workspace: ${{ env.TF_WORKSPACE }}
          message: "Speculative plan — PR #${{ github.event.number }}"
          type: apply
          speculative: true
          wait-for-completion: true

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request' && steps.tfe-pr.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
          RUN_ID: ${{ steps.tfe-pr.outputs.run-id }}
          RUN_URL: ${{ steps.tfe-pr.outputs.run-url }}
          WORKSPACE: ${{ env.TF_WORKSPACE }}
        run: |
          PLAN_ID=$(curl -s -H "Authorization: Bearer $TF_API_TOKEN" \
            https://app.terraform.io/api/v2/runs/$RUN_ID \
            | jq -r '.data.relationships.plan.data.id')

          PLAN=$(curl -s -H "Authorization: Bearer $TF_API_TOKEN" \
            https://app.terraform.io/api/v2/plans/$PLAN_ID)

          ADD=$(echo "$PLAN" | jq -r '.data.attributes."resource-additions"')
          CHG=$(echo "$PLAN" | jq -r '.data.attributes."resource-changes"')
          DEL=$(echo "$PLAN" | jq -r '.data.attributes."resource-destructions"')

          BODY="### 🤖 HCP Terraform Plan — \`${WORKSPACE}\`
          | Add 🟢 | Change 🟡 | Destroy 🔴 |
          |:---:|:---:|:---:|
          | **${ADD}** | **${CHG}** | **${DEL}** |
          🔗 [View Plan on HCP](${RUN_URL})"

          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg b "$BODY" '{body:$b}')" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.number }}/comments"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — ✅ APPLY  (push to main only)
#
# After CI passes, this job PAUSES and waits for your approval.
# Go to: Actions → the pipeline run → "Review deployments" → approve APPLY
# This will queue an apply run on your HCP Terraform workspace.
# Then go to HCP and click Apply / Discard.
#
# SETUP REQUIRED (one-time):
#   GitHub → Settings → Environments → New environment → name: "apply-gate"
#   → Add required reviewer (yourself) → Save
# ─────────────────────────────────────────────────────────────────────────────

  apply:
    name: "✅ Apply → aws-${{ matrix.environment }}"
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: apply-gate

    strategy:
      fail-fast: false
      matrix:
        environment: [dev, stage]

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: aws-${{ matrix.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        run: terraform init

      - name: Queue Apply Run on HCP Terraform
        id: tfe-apply
        uses: kvrhdn/tfe-run@v1
        with:
          token: ${{ secrets.TF_API_TOKEN }}
          organization: ronakHCP
          workspace: ${{ env.TF_WORKSPACE }}
          message: "Apply — approved by ${{ github.actor }} via GitHub Actions"
          type: apply
          speculative: false
          wait-for-completion: false

      - name: Run queued
        run: |
          echo "✅ Apply run queued on HCP Terraform!"
          echo "→ Go to HCP and click Apply or Discard:"
          echo "  ${{ steps.tfe-apply.outputs.run-url }}"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 3 — 💣 DESTROY  (push to main only)
#
# After CI passes, this job ALSO pauses and waits for your approval.
# Go to: Actions → the pipeline run → "Review deployments" → approve DESTROY
# This will queue a DESTROY run on your HCP Terraform workspace.
# Then go to HCP and click Apply (= destroy infra) or Discard.
#
# SETUP REQUIRED (one-time):
#   GitHub → Settings → Environments → New environment → name: "destroy-gate"
#   → Add required reviewer (yourself) → Save
#
# ALSO REQUIRED in HCP Terraform workspace:
#   Settings → General → Destruction and Deletion → Allow destroy plans → ON
# ─────────────────────────────────────────────────────────────────────────────

  destroy:
    name: "💣 Destroy → aws-${{ matrix.environment }}"
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: destroy-gate

    strategy:
      fail-fast: false
      matrix:
        environment: [dev, stage]

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: aws-${{ matrix.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        run: terraform init

      - name: Queue Destroy Run on HCP Terraform
        id: tfe-destroy
        uses: kvrhdn/tfe-run@v1
        with:
          token: ${{ secrets.TF_API_TOKEN }}
          organization: ronakHCP
          workspace: ${{ env.TF_WORKSPACE }}
          message: "DESTROY — approved by ${{ github.actor }} via GitHub Actions"
          type: destroy
          speculative: false
          wait-for-completion: false

      - name: Run queued
        run: |
          echo "💣 Destroy run queued on HCP Terraform!"
          echo "→ Go to HCP and click Apply (destroys) or Discard:"
          echo "  ${{ steps.tfe-destroy.outputs.run-url }}"