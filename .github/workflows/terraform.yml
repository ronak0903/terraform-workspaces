name: Terraform Cloud Pipeline

on:
  push:
    branches: [main]
    paths:
      - '**.tf'
      - '.github/workflows/terraform.yml'

  pull_request:
    branches: [main]
    paths:
      - '**.tf'
      - '.github/workflows/terraform.yml'

  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        type: choice
        options:
          - dev
          - stage
      action:
        description: "Action (apply = new infra, destroy = tear down infra)"
        required: true
        type: choice
        options:
          - apply
          - destroy

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — CI  (auto on push / PR — validate + speculative plan)
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  ci:
    name: "CI — ${{ matrix.environment }}"
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        environment: [dev, stage]

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: aws-${{ matrix.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Speculative Plan (PR only)
        if: github.event_name == 'pull_request'
        id: tfe-pr
        uses: kvrhdn/tfe-run@v1
        with:
          token: ${{ secrets.TF_API_TOKEN }}
          organization: ronakHCP
          workspace: ${{ env.TF_WORKSPACE }}
          message: "Speculative plan — PR #${{ github.event.number }}"
          type: apply
          speculative: true
          wait-for-completion: true

      - name: Comment Plan on PR
        if: github.event_name == 'pull_request' && steps.tfe-pr.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
          RUN_ID: ${{ steps.tfe-pr.outputs.run-id }}
          RUN_URL: ${{ steps.tfe-pr.outputs.run-url }}
          WORKSPACE: ${{ env.TF_WORKSPACE }}
        run: |
          PLAN_ID=$(curl -s -H "Authorization: Bearer $TF_API_TOKEN" \
            https://app.terraform.io/api/v2/runs/$RUN_ID | jq -r '.data.relationships.plan.data.id')

          PLAN=$(curl -s -H "Authorization: Bearer $TF_API_TOKEN" \
            https://app.terraform.io/api/v2/plans/$PLAN_ID)

          ADD=$(echo "$PLAN" | jq -r '.data.attributes."resource-additions"')
          CHG=$(echo "$PLAN" | jq -r '.data.attributes."resource-changes"')
          DEL=$(echo "$PLAN" | jq -r '.data.attributes."resource-destructions"')

          BODY="### 🤖 HCP Terraform Plan — \`${WORKSPACE}\`
          | Add 🟢 | Change 🟡 | Destroy 🔴 |
          |:---:|:---:|:---:|
          | **${ADD}** | **${CHG}** | **${DEL}** |
          🔗 [View Plan on HCP](${RUN_URL})"

          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg b "$BODY" '{body:$b}')" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.number }}/comments"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Manual Apply / Destroy
#
# HOW TO USE:
#   GitHub → Actions tab → "Terraform Cloud Pipeline" → "Run workflow" button
#   → pick environment (dev / stage) + action (apply / destroy) → Run
#
# apply   → queues an APPLY run on HCP workspace  → you approve in HCP UI
# destroy → queues a DESTROY run on HCP workspace → you approve in HCP UI
# ─────────────────────────────────────────────────────────────────────────────

  manual:
    name: "Manual ${{ github.event.inputs.action == 'destroy' && '💣 DESTROY' || '✅ Apply' }} → aws-${{ github.event.inputs.environment }}"
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: aws-${{ github.event.inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate -no-color

      - name: Queue ${{ github.event.inputs.action }} run on HCP Terraform
        id: tfe-run
        uses: kvrhdn/tfe-run@v1
        with:
          token: ${{ secrets.TF_API_TOKEN }}
          organization: ronakHCP
          workspace: ${{ env.TF_WORKSPACE }}
          message: "Manual ${{ github.event.inputs.action }} by ${{ github.actor }}"
          type: ${{ github.event.inputs.action }}
          speculative: false
          wait-for-completion: false

      - name: Run URL
        run: |
          echo "HCP run queued:"
          echo "${{ steps.tfe-run.outputs.run-url }}"
          echo "Go to the URL above → approve to ${{ github.event.inputs.action }}"