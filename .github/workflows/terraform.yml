name: Terraform Cloud Pipeline

on:

  push:
    branches:
      - main
    paths:
      - '**.tf'
      - '.github/workflows/terraform.yml'

  pull_request:
    branches:
      - main
    paths:
      - '**.tf'
      - '.github/workflows/terraform.yml'

  workflow_dispatch:

    inputs:

      environment:
        description: "Select Environment"
        required: true
        type: choice
        options:
          - dev
          - stage

      action:
        description: "Terraform Action"
        required: true
        type: choice
        options:
          - apply
          - destroy

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 ─ CI: Validate + Speculative Plan (push / PR only)
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  ci:
    name: "CI (${{ matrix.environment }})"
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        environment: ["dev", "stage"]

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: aws-${{ matrix.environment }}

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Trigger HCP Terraform Speculative Plan
        if: github.event_name == 'pull_request'
        id: tfe-run
        uses: kvrhdn/tfe-run@v1
        with:
          token: ${{ secrets.TF_API_TOKEN }}
          organization: ronakHCP
          workspace: ${{ env.TF_WORKSPACE }}
          message: "Speculative Plan — PR #${{ github.event.number }} | Commit: ${{ github.sha }}"
          type: apply
          speculative: true
          wait-for-completion: true

      - name: Trigger HCP Terraform Plan (Push to main)
        if: github.event_name == 'push'
        id: tfe-push-run
        uses: kvrhdn/tfe-run@v1
        with:
          token: ${{ secrets.TF_API_TOKEN }}
          organization: ronakHCP
          workspace: ${{ env.TF_WORKSPACE }}
          message: "Triggered from GitHub Actions (Commit: ${{ github.sha }} | Event: push)"
          type: apply
          speculative: false
          wait-for-completion: false

      - name: Fetch Plan Details and Comment on PR
        if: github.event_name == 'pull_request' && always() && steps.tfe-run.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
          RUN_ID: ${{ steps.tfe-run.outputs.run-id }}
          RUN_URL: ${{ steps.tfe-run.outputs.run-url }}
          WORKSPACE: ${{ env.TF_WORKSPACE }}
        run: |
          # 1. Fetch Run Details
          RUN_RESPONSE=$(curl -s \
            --header "Authorization: Bearer $TF_API_TOKEN" \
            --header "Content-Type: application/vnd.api+json" \
            https://app.terraform.io/api/v2/runs/$RUN_ID)

          # Extract Plan ID
          PLAN_ID=$(echo "$RUN_RESPONSE" | jq -r '.data.relationships.plan.data.id')

          # 2. Fetch Plan Details
          PLAN_RESPONSE=$(curl -s \
            --header "Authorization: Bearer $TF_API_TOKEN" \
            --header "Content-Type: application/vnd.api+json" \
            https://app.terraform.io/api/v2/plans/$PLAN_ID)

          # Extract additions, changes, destructions
          ADDITIONS=$(echo "$PLAN_RESPONSE" | jq -r '.data.attributes."resource-additions"')
          CHANGES=$(echo "$PLAN_RESPONSE" | jq -r '.data.attributes."resource-changes"')
          DESTRUCTIONS=$(echo "$PLAN_RESPONSE" | jq -r '.data.attributes."resource-destructions"')

          # 3. Format Comment Body
          COMMENT_BODY="### 🤖 HCP Terraform Plan Results (\`${WORKSPACE}\`)

          A speculative plan has been successfully completed for workspace **${WORKSPACE}**:
          
          | Additions 🟢 | Changes 🟡 | Destructions 🔴 |
          |:---:|:---:|:---:|
          | **${ADDITIONS}** | **${CHANGES}** | **${DESTRUCTIONS}** |

          🔗 [View Detailed Plan Logs on HCP Terraform](${RUN_URL})

          *Note: This is a speculative plan. Apply must be triggered via the main pipeline after merge.*"

          # 4. Post comment to PR
          curl -s \
            -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg body "$COMMENT_BODY" '{body: $body}')" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.number }}/comments"

      - name: Send Slack Notification
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ steps.tfe-run.outputs.run-url || steps.tfe-push-run.outputs.run-url }}
          WORKSPACE: ${{ env.TF_WORKSPACE }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "Slack Webhook URL is not configured. Skipping notification."
            exit 0
          fi

          if [ "${{ job.status }}" = "success" ]; then
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              COLOR="#2eb886"
              STATUS_TEXT="🟢 Speculative Plan Completed"
            else
              COLOR="#e0a111"
              STATUS_TEXT="🟡 Run Queued (Pending Approval)"
            fi
          else
            COLOR="#a30200"
            STATUS_TEXT="🔴 Pipeline Failed"
          fi

          COMMIT_LINK="<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
          MESSAGE="*Workspace:* \`${WORKSPACE}\`\n*Event:* \`${{ github.event_name }}\` (by ${{ github.actor }})\n*Commit:* ${COMMIT_LINK}"

          if [ ! -z "$RUN_URL" ]; then
            ACTIONS_BLOCK=",
            {
              \"type\": \"actions\",
              \"elements\": [
                {
                  \"type\": \"button\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"View Run on HCP\",
                    \"emoji\": true
                  },
                  \"url\": \"${RUN_URL}\"
                }
              ]
            }"
          else
            ACTIONS_BLOCK=""
          fi

          PAYLOAD="{\"attachments\":[{
            \"color\": \"${COLOR}\",
            \"blocks\": [
              {
                \"type\": \"header\",
                \"text\": {
                  \"type\": \"plain_text\",
                  \"text\": \"HCP Terraform: ${STATUS_TEXT}\",
                  \"emoji\": true
                }
              },
              {
                \"type\": \"section\",
                \"text\": {
                  \"type\": \"mrkdwn\",
                  \"text\": \"${MESSAGE}\"
                }
              }${ACTIONS_BLOCK}
            ]
          }]}"

          curl -s -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 ─ Manual Apply / Destroy (workflow_dispatch only)
# ─────────────────────────────────────────────────────────────────────────────

  manual-apply-destroy:
    name: "🚀 Manual ${{ github.event.inputs.action == 'destroy' && '💣 DESTROY' || '✅ Apply' }} → ${{ github.event.inputs.environment }}"
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    # ── Requires a GitHub Environment named "apply-destroy-gate" with a
    #    required reviewer configured so a human must approve before this
    #    job runs. Go to: Settings → Environments → apply-destroy-gate
    environment: apply-destroy-gate

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: aws-${{ github.event.inputs.environment }}

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # ── This step triggers either an Apply or Destroy run in HCP Terraform.
      #    The run will still be queued/pending in HCP Terraform so you can
      #    review the plan before clicking "Apply" or "Discard" in the UI.
      - name: Trigger HCP Terraform — ${{ github.event.inputs.action }}
        id: tfe-run
        uses: kvrhdn/tfe-run@v1
        with:
          token: ${{ secrets.TF_API_TOKEN }}
          organization: ronakHCP
          workspace: ${{ env.TF_WORKSPACE }}
          message: "Manual ${{ github.event.inputs.action }} — triggered by ${{ github.actor }} via GitHub Actions"
          type: ${{ github.event.inputs.action }}
          speculative: false
          wait-for-completion: false

      - name: Print Run URL
        if: steps.tfe-run.outputs.run-url != ''
        run: |
          echo "──────────────────────────────────────────"
          echo "  HCP Terraform Run URL:"
          echo "  ${{ steps.tfe-run.outputs.run-url }}"
          echo ""
          echo "  ➡  Go to the URL above, review the plan,"
          echo "     then click 'Apply' or 'Discard' in the"
          echo "     HCP Terraform workspace UI."
          echo "──────────────────────────────────────────"

      - name: Send Slack Notification
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ steps.tfe-run.outputs.run-url }}
          ACTION: ${{ github.event.inputs.action }}
          WORKSPACE: ${{ env.TF_WORKSPACE }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then
            echo "Slack Webhook URL is not configured. Skipping notification."
            exit 0
          fi

          if [ "${{ job.status }}" = "success" ]; then
            if [ "$ACTION" = "destroy" ]; then
              COLOR="#a30200"
              STATUS_TEXT="💣 DESTROY Run Queued — Awaiting Approval in HCP"
            else
              COLOR="#e0a111"
              STATUS_TEXT="🟡 Apply Run Queued — Awaiting Approval in HCP"
            fi
          else
            COLOR="#a30200"
            STATUS_TEXT="🔴 Manual Pipeline Failed"
          fi

          COMMIT_LINK="<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
          MESSAGE="*Workspace:* \`${WORKSPACE}\`\n*Action:* \`${ACTION}\`\n*Triggered by:* ${{ github.actor }}\n*Commit:* ${COMMIT_LINK}"

          if [ ! -z "$RUN_URL" ]; then
            ACTIONS_BLOCK=",
            {
              \"type\": \"actions\",
              \"elements\": [
                {
                  \"type\": \"button\",
                  \"text\": {
                    \"type\": \"plain_text\",
                    \"text\": \"Approve / Discard on HCP\",
                    \"emoji\": true
                  },
                  \"style\": \"$([ \"$ACTION\" = \"destroy\" ] && echo 'danger' || echo 'primary')\",
                  \"url\": \"${RUN_URL}\"
                }
              ]
            }"
          else
            ACTIONS_BLOCK=""
          fi

          PAYLOAD="{\"attachments\":[{
            \"color\": \"${COLOR}\",
            \"blocks\": [
              {
                \"type\": \"header\",
                \"text\": {
                  \"type\": \"plain_text\",
                  \"text\": \"HCP Terraform: ${STATUS_TEXT}\",
                  \"emoji\": true
                }
              },
              {
                \"type\": \"section\",
                \"text\": {
                  \"type\": \"mrkdwn\",
                  \"text\": \"${MESSAGE}\"
                }
              }${ACTIONS_BLOCK}
            ]
          }]}"

          curl -s -X POST -H 'Content-type: application/json' --data "$PAYLOAD" "$SLACK_WEBHOOK"