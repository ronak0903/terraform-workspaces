name: Terraform Cloud Pipeline

on:

  push:
    branches:
      - main
    paths:
      - '**.tf'
      - '.github/workflows/terraform.yml'

  pull_request:
    branches:
      - main
    paths:
      - '**.tf'
      - '.github/workflows/terraform.yml'

  workflow_dispatch:
    inputs:
      environment:
        description: "Select Environment"
        required: true
        type: choice
        options:
          - dev
          - stage
      action:
        description: "Select Action"
        required: true
        type: choice
        options:
          - apply
          - destroy

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — CI: Validate + Plan  (runs on push / pull_request only)
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  terraform:
    name: "Terraform (${{ matrix.environment }} - ${{ github.event_name == 'pull_request' && 'PR Plan' || 'Plan' }})"
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        environment: ["dev", "stage"]

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: aws-${{ matrix.environment }}

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # Speculative plan on PR — does NOT apply, just shows the diff
      - name: Trigger HCP Terraform Speculative Plan (PR)
        if: github.event_name == 'pull_request'
        id: tfe-pr
        uses: kvrhdn/tfe-run@v1
        with:
          token: ${{ secrets.TF_API_TOKEN }}
          organization: ronakHCP
          workspace: ${{ env.TF_WORKSPACE }}
          message: "Speculative Plan — PR #${{ github.event.number }} | ${{ github.sha }}"
          type: apply
          speculative: true
          wait-for-completion: true

      # Queue an apply run on push to main — you approve/discard in HCP UI
      - name: Trigger HCP Terraform Apply Run (Push)
        if: github.event_name == 'push'
        id: tfe-push
        uses: kvrhdn/tfe-run@v1
        with:
          token: ${{ secrets.TF_API_TOKEN }}
          organization: ronakHCP
          workspace: ${{ env.TF_WORKSPACE }}
          message: "Auto-queued from push | Commit: ${{ github.sha }}"
          type: apply
          speculative: false
          wait-for-completion: false

      - name: Comment Plan Results on PR
        if: github.event_name == 'pull_request' && always() && steps.tfe-pr.outcome == 'success'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
          RUN_ID: ${{ steps.tfe-pr.outputs.run-id }}
          RUN_URL: ${{ steps.tfe-pr.outputs.run-url }}
          WORKSPACE: ${{ env.TF_WORKSPACE }}
        run: |
          RUN_RESPONSE=$(curl -s \
            --header "Authorization: Bearer $TF_API_TOKEN" \
            --header "Content-Type: application/vnd.api+json" \
            https://app.terraform.io/api/v2/runs/$RUN_ID)

          PLAN_ID=$(echo "$RUN_RESPONSE" | jq -r '.data.relationships.plan.data.id')

          PLAN_RESPONSE=$(curl -s \
            --header "Authorization: Bearer $TF_API_TOKEN" \
            --header "Content-Type: application/vnd.api+json" \
            https://app.terraform.io/api/v2/plans/$PLAN_ID)

          ADDITIONS=$(echo "$PLAN_RESPONSE"   | jq -r '.data.attributes."resource-additions"')
          CHANGES=$(echo "$PLAN_RESPONSE"     | jq -r '.data.attributes."resource-changes"')
          DESTRUCTIONS=$(echo "$PLAN_RESPONSE"| jq -r '.data.attributes."resource-destructions"')

          COMMENT_BODY="### 🤖 HCP Terraform Plan Results (\`${WORKSPACE}\`)

          | Additions 🟢 | Changes 🟡 | Destructions 🔴 |
          |:---:|:---:|:---:|
          | **${ADDITIONS}** | **${CHANGES}** | **${DESTRUCTIONS}** |

          🔗 [View Detailed Plan on HCP Terraform](${RUN_URL})"

          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg body "$COMMENT_BODY" '{body: $body}')" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.number }}/comments"

      - name: Slack Notification
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ steps.tfe-pr.outputs.run-url || steps.tfe-push.outputs.run-url }}
          WORKSPACE: ${{ env.TF_WORKSPACE }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then echo "No Slack webhook set, skipping."; exit 0; fi

          if [ "${{ job.status }}" = "success" ]; then
            [ "${{ github.event_name }}" = "pull_request" ] \
              && COLOR="#2eb886" && STATUS_TEXT="🟢 Speculative Plan Completed" \
              || COLOR="#e0a111" && STATUS_TEXT="🟡 Apply Run Queued (Approve in HCP)"
          else
            COLOR="#a30200"; STATUS_TEXT="🔴 Pipeline Failed"
          fi

          COMMIT_LINK="<${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>"
          MSG="*Workspace:* \`${WORKSPACE}\`\n*Event:* \`${{ github.event_name }}\` by ${{ github.actor }}\n*Commit:* ${COMMIT_LINK}"

          [ -n "$RUN_URL" ] && BTN=",{\"type\":\"actions\",\"elements\":[{\"type\":\"button\",\"text\":{\"type\":\"plain_text\",\"text\":\"View Run on HCP\",\"emoji\":true},\"url\":\"${RUN_URL}\"}]}" || BTN=""

          curl -s -X POST -H 'Content-type: application/json' --data \
            "{\"attachments\":[{\"color\":\"${COLOR}\",\"blocks\":[{\"type\":\"header\",\"text\":{\"type\":\"plain_text\",\"text\":\"HCP Terraform: ${STATUS_TEXT}\",\"emoji\":true}},{\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"${MSG}\"}}${BTN}]}]}" \
            "$SLACK_WEBHOOK"

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Manual Apply / Destroy  (runs ONLY on workflow_dispatch)
# ─────────────────────────────────────────────────────────────────────────────

  manual:
    name: "🖐 Manual ${{ github.event.inputs.action == 'destroy' && '💣 DESTROY' || '✅ Apply' }} → aws-${{ github.event.inputs.environment }}"
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: aws-${{ github.event.inputs.environment }}

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      # ── APPLY: Queue an apply run in HCP Terraform workspace.
      #    Go to the workspace URL and click Apply / Discard.
      - name: "✅ Trigger Apply Run in HCP Terraform Workspace"
        if: github.event.inputs.action == 'apply'
        id: tfe-apply
        uses: kvrhdn/tfe-run@v1
        with:
          token: ${{ secrets.TF_API_TOKEN }}
          organization: ronakHCP
          workspace: ${{ env.TF_WORKSPACE }}
          message: "Manual Apply — triggered by ${{ github.actor }}"
          type: apply
          speculative: false
          wait-for-completion: false

      # ── DESTROY: Queue a destroy run in HCP Terraform workspace.
      #    Go to the workspace URL and click Apply / Discard to actually destroy.
      - name: "💣 Trigger Destroy Run in HCP Terraform Workspace"
        if: github.event.inputs.action == 'destroy'
        id: tfe-destroy
        uses: kvrhdn/tfe-run@v1
        with:
          token: ${{ secrets.TF_API_TOKEN }}
          organization: ronakHCP
          workspace: ${{ env.TF_WORKSPACE }}
          message: "Manual DESTROY — triggered by ${{ github.actor }}"
          type: destroy
          speculative: false
          wait-for-completion: false

      - name: "🔗 Print Run URL"
        if: always() && (steps.tfe-apply.outputs.run-url != '' || steps.tfe-destroy.outputs.run-url != '')
        run: |
          RUN_URL="${{ steps.tfe-apply.outputs.run-url }}${{ steps.tfe-destroy.outputs.run-url }}"
          echo "================================================"
          echo " ${{ github.event.inputs.action }} run queued in HCP Terraform!"
          echo " → Go here to Approve or Discard:"
          echo "   ${RUN_URL}"
          echo "================================================"

      - name: Slack Notification
        if: always()
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK_URL }}
          ACTION: ${{ github.event.inputs.action }}
          WORKSPACE: ${{ env.TF_WORKSPACE }}
          RUN_URL: ${{ steps.tfe-apply.outputs.run-url }}${{ steps.tfe-destroy.outputs.run-url }}
        run: |
          if [ -z "$SLACK_WEBHOOK" ]; then echo "No Slack webhook set, skipping."; exit 0; fi

          if [ "${{ job.status }}" = "success" ]; then
            if [ "$ACTION" = "destroy" ]; then
              COLOR="#a30200"; STATUS_TEXT="💣 Destroy Run Queued — Approve in HCP Workspace"
            else
              COLOR="#e0a111"; STATUS_TEXT="🟡 Apply Run Queued — Approve in HCP Workspace"
            fi
          else
            COLOR="#a30200"; STATUS_TEXT="🔴 Manual Action Failed"
          fi

          MSG="*Workspace:* \`${WORKSPACE}\`\n*Action:* \`${ACTION}\`\n*Triggered by:* ${{ github.actor }}"

          [ -n "$RUN_URL" ] && BTN=",{\"type\":\"actions\",\"elements\":[{\"type\":\"button\",\"text\":{\"type\":\"plain_text\",\"text\":\"Approve / Discard on HCP\",\"emoji\":true},\"url\":\"${RUN_URL}\"}]}" || BTN=""

          curl -s -X POST -H 'Content-type: application/json' --data \
            "{\"attachments\":[{\"color\":\"${COLOR}\",\"blocks\":[{\"type\":\"header\",\"text\":{\"type\":\"plain_text\",\"text\":\"HCP Terraform: ${STATUS_TEXT}\",\"emoji\":true}},{\"type\":\"section\",\"text\":{\"type\":\"mrkdwn\",\"text\":\"${MSG}\"}}${BTN}]}]}" \
            "$SLACK_WEBHOOK"