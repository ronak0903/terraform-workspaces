name: Terraform Cloud Pipeline

on:

  push:
    branches:
      - main
    paths:
      - '**.tf'
      - '.github/workflows/terraform.yml'

  workflow_dispatch:

    inputs:

      environment:
        description: "Select Environment"
        required: true
        type: choice
        options:
          - dev
          - stage

      action:
        description: "Terraform Action"
        required: true
        type: choice
        options:
          - validate
          - plan
          - destroy

jobs:

  terraform:

    name: "Terraform (${{ matrix.environment }} - ${{ github.event.inputs.action || 'plan' }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ github.event.inputs.environment && fromJSON(format('["{0}"]', github.event.inputs.environment)) || fromJSON('["dev", "stage"]') }}

    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: aws-${{ matrix.environment }}

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        if: github.event.inputs.action == 'validate' || github.event_name == 'push'
        id: validate
        run: terraform validate -no-color

      - name: Trigger HCP Terraform Run (Plan / Destroy)
        if: github.event.inputs.action == 'plan' || github.event.inputs.action == 'destroy' || github.event_name == 'push'
        id: tfe-run
        uses: kvrhdn/tfe-run@v1
        with:
          token: ${{ secrets.TF_API_TOKEN }}
          organization: ronakHCP
          workspace: ${{ env.TF_WORKSPACE }}
          message: "Triggered from GitHub Actions (Commit: ${{ github.sha }} | Event: ${{ github.event_name }})"
          type: ${{ github.event.inputs.action == 'destroy' && 'destroy' || 'apply' }}